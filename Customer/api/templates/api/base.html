<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora Referral System</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        nav { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #ccc; }
        a { text-decoration: none; color: #007bff; }
        form { margin-top: 20px; }
        label { display: block; margin-top: 10px; }
        input, select { margin-bottom: 10px; padding: 5px; width: 100%; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'referral_list' %}">Referrals</a> | 
        <a href="{% url 'create_referral' %}">Create New Referral</a> |
        <a href="/admin/">Admin Panel</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
