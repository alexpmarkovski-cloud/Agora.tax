{% extends 'api/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
    <h2 style="text-align: center;">Login</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label for="id_username">Username:</label>
            {{ form.username }}
        </div>
        <div style="margin-bottom: 20px;">
            <label for="id_password">Password:</label>
            {{ form.password }}
        </div>
        <button type="submit" style="width: 100%;">Login</button>
    </form>
    
    {% if form.errors %}
        <p style="color: red; text-align: center; margin-top: 10px;">Your username and password didn't match. Please try again.</p>
    {% endif %}
</div>
{% endblock %}
